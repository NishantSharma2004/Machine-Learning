<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoilSense - Predict Crop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2d19 0%, #06160b 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --accent-green: #34d399; /* Emerald */
            --accent-bright: #10b981;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 1;
        }
        .orb-1 {
            width: 350px;
            height: 350px;
            background: rgba(16, 185, 129, 0.12);
            top: 5%;
            right: 10%;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #34d399, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .logo span {
            color: var(--text-primary);
            font-weight: 300;
            -webkit-text-fill-color: var(--text-primary);
        }

        .btn-back {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }
        .btn-back:hover {
            color: var(--accent-green);
        }

        main {
            flex: 1;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .form-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            font-family: inherit;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-green);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.15);
        }

        .btn-submit {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3);
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
        }

        /* Results Box Styling */
        .result-box {
            margin-top: 2.5rem;
            background: rgba(16, 185, 129, 0.08);
            border: 1px dashed var(--accent-green);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .result-box h3 {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .crop-name {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent-green);
            background: linear-gradient(to right, #34d399, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-box {
            margin-top: 2.5rem;
            background: rgba(239, 68, 68, 0.08);
            border: 1px dashed #ef4444;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            color: #fca5a5;
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.9rem;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .form-card {
                padding: 2rem 1.5rem;
            }
            .crop-name {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>

    <header>
        <a href="/" class="logo">🌿 Soil<span>Sense</span></a>
        <a href="/" class="btn-back">← Back to Home</a>
    </header>

    <main>
        <div class="form-card">
            <h2>Analyze Soil Metrics</h2>
            <form action="/predict" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="N">Nitrogen (N) - Ratio in Soil</label>
                        <input type="number" step="any" name="N" id="N" placeholder="e.g. 90" required value="{{ inputs.N if inputs else '' }}">
                    </div>
                    <div class="form-group">
                        <label for="P">Phosphorus (P) - Ratio in Soil</label>
                        <input type="number" step="any" name="P" id="P" placeholder="e.g. 42" required value="{{ inputs.P if inputs else '' }}">
                    </div>
                    <div class="form-group">
                        <label for="K">Potassium (K) - Ratio in Soil</label>
                        <input type="number" step="any" name="K" id="K" placeholder="e.g. 43" required value="{{ inputs.K if inputs else '' }}">
                    </div>
                    <div class="form-group">
                        <label for="temperature">Temperature (°C)</label>
                        <input type="number" step="any" name="temperature" id="temperature" placeholder="e.g. 21.5" required value="{{ inputs.temperature if inputs else '' }}">
                    </div>
                    <div class="form-group">
                        <label for="humidity">Relative Humidity (%)</label>
                        <input type="number" step="any" name="humidity" id="humidity" placeholder="e.g. 82.0" required value="{{ inputs.humidity if inputs else '' }}">
                    </div>
                    <div class="form-group">
                        <label for="ph">Soil pH Value (0.0 - 14.0)</label>
                        <input type="number" step="any" name="ph" id="ph" placeholder="e.g. 6.5" required value="{{ inputs.ph if inputs else '' }}">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="rainfall">Average Rainfall (mm)</label>
                        <input type="number" step="any" name="rainfall" id="rainfall" placeholder="e.g. 202.9" required value="{{ inputs.rainfall if inputs else '' }}">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Analyze Soil & Recommend Crop</button>
            </form>

            {% if prediction %}
            <div class="result-box">
                <h3>Recommended Crop</h3>
                <div class="crop-name">{{ prediction }}</div>
            </div>
            {% endif %}

            {% if error %}
            <div class="error-box">
                <strong>Error:</strong> {{ error }}
            </div>
            {% endif %}
        </div>
    </main>

    <footer>
        <p>&copy; 2026 SoilSense. Driven by Random Forest Classifier.</p>
    </footer>
</body>
</html>
